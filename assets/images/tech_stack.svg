<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1000" height="600" fill="#f8f9fa"/>
  
  <!-- 標題 -->
  <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    技術棧架構
  </text>
  
  <!-- Layer 1: Application Layer -->
  <g>
    <text x="50" y="80" font-size="14" font-weight="bold" fill="#1a1a1a">應用層</text>
    
    <rect x="50" y="95" width="200" height="60" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="5"/>
    <text x="150" y="120" font-size="12" font-weight="bold" text-anchor="middle" fill="#7c2d12">Python API</text>
    <text x="150" y="145" font-size="11" text-anchor="middle" fill="#92400e">簡單易用的接口</text>
    
    <rect x="350" y="95" width="200" height="60" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="5"/>
    <text x="450" y="120" font-size="12" font-weight="bold" text-anchor="middle" fill="#7c2d12">命令行工具</text>
    <text x="450" y="145" font-size="11" text-anchor="middle" fill="#92400e">CLI 腳本</text>
    
    <rect x="650" y="95" width="300" height="60" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="5"/>
    <text x="800" y="120" font-size="12" font-weight="bold" text-anchor="middle" fill="#7c2d12">配置文件 (YAML/JSON)</text>
    <text x="800" y="145" font-size="11" text-anchor="middle" fill="#92400e">靈活的參數配置</text>
  </g>
  
  <!-- Arrow -->
  <line x1="500" y1="155" x2="500" y2="175" stroke="#999" stroke-width="2"/>
  
  <!-- Layer 2: Core Framework -->
  <g>
    <text x="50" y="195" font-size="14" font-weight="bold" fill="#1a1a1a">核心框架</text>
    
    <!-- Deep Learning -->
    <rect x="50" y="210" width="180" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="140" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Deep Learning</text>
    <text x="140" y="260" font-size="11" text-anchor="middle" fill="#0369a1">PyTorch 2.0+</text>
    <text x="140" y="275" font-size="11" text-anchor="middle" fill="#0369a1">CUDA/cuDNN</text>
    
    <!-- NLP -->
    <rect x="290" y="210" width="180" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="380" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">LLM Framework</text>
    <text x="380" y="260" font-size="11" text-anchor="middle" fill="#0369a1">Transformers 4.30+</text>
    <text x="380" y="275" font-size="11" text-anchor="middle" fill="#0369a1">PEFT (LoRA)</text>
    
    <!-- RL -->
    <rect x="530" y="210" width="180" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="620" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">強化學習</text>
    <text x="620" y="260" font-size="11" text-anchor="middle" fill="#0369a1">Stable-Baselines3</text>
    <text x="620" y="275" font-size="11" text-anchor="middle" fill="#0369a1">Gymnasium</text>
    
    <!-- Tools -->
    <rect x="770" y="210" width="180" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="860" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">工具庫</text>
    <text x="860" y="260" font-size="11" text-anchor="middle" fill="#0369a1">TensorBoard</text>
    <text x="860" y="275" font-size="11" text-anchor="middle" fill="#0369a1">NLTK, SacreBLEU</text>
  </g>
  
  <!-- Arrow -->
  <line x1="500" y1="280" x2="500" y2="300" stroke="#999" stroke-width="2"/>
  
  <!-- Layer 3: Core Modules -->
  <g>
    <text x="50" y="320" font-size="14" font-weight="bold" fill="#1a1a1a">核心模塊</text>
    
    <!-- Models -->
    <rect x="50" y="335" width="140" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="120" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">Models</text>
    <text x="120" y="380" font-size="10" text-anchor="middle" fill="#16a34a">• BaseModel</text>
    <text x="120" y="398" font-size="10" text-anchor="middle" fill="#16a34a">• LoRAModel</text>
    <text x="120" y="416" font-size="10" text-anchor="middle" fill="#16a34a">• OptimizedModel</text>
    <text x="120" y="429" font-size="10" text-anchor="middle" fill="#16a34a">• Config Manager</text>
    
    <!-- RL -->
    <rect x="240" y="335" width="140" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="310" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">RL Module</text>
    <text x="310" y="380" font-size="10" text-anchor="middle" fill="#16a34a">• PolicyNetwork</text>
    <text x="310" y="398" font-size="10" text-anchor="middle" fill="#16a34a">• PPOTrainer</text>
    <text x="310" y="416" font-size="10" text-anchor="middle" fill="#16a34a">• DQNTrainer</text>
    <text x="310" y="429" font-size="10" text-anchor="middle" fill="#16a34a">• RewardFunc</text>
    
    <!-- Optimization -->
    <rect x="430" y="335" width="140" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="500" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">Optimization</text>
    <text x="500" y="380" font-size="10" text-anchor="middle" fill="#16a34a">• Quantizer</text>
    <text x="500" y="398" font-size="10" text-anchor="middle" fill="#16a34a">• KV Cache</text>
    <text x="500" y="416" font-size="10" text-anchor="middle" fill="#16a34a">• MixedPrecision</text>
    <text x="500" y="429" font-size="10" text-anchor="middle" fill="#16a34a">• TokenPruning</text>
    
    <!-- Utilities -->
    <rect x="620" y="335" width="140" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="690" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">Utilities</text>
    <text x="690" y="380" font-size="10" text-anchor="middle" fill="#16a34a">• Data Utils</text>
    <text x="690" y="398" font-size="10" text-anchor="middle" fill="#16a34a">• Metrics</text>
    <text x="690" y="416" font-size="10" text-anchor="middle" fill="#16a34a">• Logger</text>
    <text x="690" y="429" font-size="10" text-anchor="middle" fill="#16a34a">• Monitor</text>
    
    <!-- Testing -->
    <rect x="810" y="335" width="140" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="880" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">Testing</text>
    <text x="880" y="380" font-size="10" text-anchor="middle" fill="#16a34a">• Unit Tests</text>
    <text x="880" y="398" font-size="10" text-anchor="middle" fill="#16a34a">• Integration</text>
    <text x="880" y="416" font-size="10" text-anchor="middle" fill="#16a34a">• E2E Tests</text>
    <text x="880" y="429" font-size="10" text-anchor="middle" fill="#16a34a">• Benchmarks</text>
  </g>
  
  <!-- Arrow -->
  <line x1="500" y1="435" x2="500" y2="455" stroke="#999" stroke-width="2"/>
  
  <!-- Layer 4: Data & Infrastructure -->
  <g>
    <text x="50" y="475" font-size="14" font-weight="bold" fill="#1a1a1a">數據與基礎設施</text>
    
    <!-- Data -->
    <rect x="50" y="490" width="220" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="160" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">數據層</text>
    <text x="160" y="545" font-size="11" text-anchor="middle" fill="#b45309">• 原始數據集</text>
    <text x="160" y="560" font-size="11" text-anchor="middle" fill="#b45309">• 預處理管道</text>
    
    <!-- Storage -->
    <rect x="340" y="490" width="220" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="450" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">存儲層</text>
    <text x="450" y="545" font-size="11" text-anchor="middle" fill="#b45309">• 模型檢查點</text>
    <text x="450" y="560" font-size="11" text-anchor="middle" fill="#b45309">• 訓練日誌</text>
    
    <!-- Hardware -->
    <rect x="630" y="490" width="320" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="790" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">硬件與環境</text>
    <text x="790" y="545" font-size="11" text-anchor="middle" fill="#b45309">• GPU (NVIDIA A100/H100)</text>
    <text x="790" y="560" font-size="11" text-anchor="middle" fill="#b45309">• CPU (Intel/AMD)</text>
  </g>
</svg>