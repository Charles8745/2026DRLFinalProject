<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="400" fill="#f8f9fa"/>
  
  <!-- 標題 -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    5 階段開發計劃 (12 週)
  </text>
  
  <!-- Phase 1 -->
  <g>
    <rect x="20" y="80" width="180" height="280" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="5"/>
    <text x="110" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#7c2d12">Phase 1</text>
    <text x="110" y="135" font-size="12" text-anchor="middle" fill="#92400e">環境設置</text>
    <text x="110" y="155" font-size="12" text-anchor="middle" fill="#92400e">文獻研究</text>
    <text x="110" y="175" font-size="12" text-anchor="middle" fill="#92400e">原型驗證</text>
    <text x="110" y="200" font-size="11" text-anchor="middle" fill="#7c2d12" font-weight="bold">Week 1-2</text>
    <text x="110" y="230" font-size="10" text-anchor="middle" fill="#7c2d12">✓ 環境配置</text>
    <text x="110" y="250" font-size="10" text-anchor="middle" fill="#7c2d12">✓ LoRA 研究</text>
    <text x="110" y="270" font-size="10" text-anchor="middle" fill="#7c2d12">✓ RL 基礎</text>
    <text x="110" y="290" font-size="10" text-anchor="middle" fill="#7c2d12">✓ 原型完成</text>
    <text x="110" y="340" font-size="10" text-anchor="middle" fill="#92400e" font-weight="bold">📋 計劃中</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="200" y1="220" x2="240" y2="220" stroke="#666" stroke-width="3"/>
  <polygon points="240,220 230,215 230,225" fill="#666"/>
  
  <!-- Phase 2 -->
  <g>
    <rect x="240" y="80" width="180" height="280" fill="#fdd7e4" stroke="#d8306c" stroke-width="2" rx="5"/>
    <text x="330" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#831843">Phase 2</text>
    <text x="330" y="135" font-size="12" text-anchor="middle" fill="#9d174d">架構設計</text>
    <text x="330" y="155" font-size="12" text-anchor="middle" fill="#9d174d">API 規範</text>
    <text x="330" y="175" font-size="12" text-anchor="middle" fill="#9d174d">數據管道</text>
    <text x="330" y="200" font-size="11" text-anchor="middle" fill="#831843" font-weight="bold">Week 3-4</text>
    <text x="330" y="230" font-size="10" text-anchor="middle" fill="#831843">✓ 架構完成</text>
    <text x="330" y="250" font-size="10" text-anchor="middle" fill="#831843">✓ API 設計</text>
    <text x="330" y="270" font-size="10" text-anchor="middle" fill="#831843">✓ 數據加載器</text>
    <text x="330" y="290" font-size="10" text-anchor="middle" fill="#831843">✓ 預處理</text>
    <text x="330" y="340" font-size="10" text-anchor="middle" fill="#9d174d" font-weight="bold">📋 計劃中</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="420" y1="220" x2="460" y2="220" stroke="#666" stroke-width="3"/>
  <polygon points="460,220 450,215 450,225" fill="#666"/>
  
  <!-- Phase 3 -->
  <g>
    <rect x="460" y="80" width="180" height="280" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2" rx="5"/>
    <text x="550" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#5b21b6">Phase 3</text>
    <text x="550" y="135" font-size="12" text-anchor="middle" fill="#7c3aed">核心實現</text>
    <text x="550" y="155" font-size="12" text-anchor="middle" fill="#7c3aed">單元測試</text>
    <text x="550" y="175" font-size="12" text-anchor="middle" fill="#7c3aed">集成測試</text>
    <text x="550" y="200" font-size="11" text-anchor="middle" fill="#5b21b6" font-weight="bold">Week 5-8</text>
    <text x="550" y="230" font-size="10" text-anchor="middle" fill="#5b21b6">✓ LoRA 模塊</text>
    <text x="550" y="250" font-size="10" text-anchor="middle" fill="#5b21b6">✓ RL 模塊</text>
    <text x="550" y="270" font-size="10" text-anchor="middle" fill="#5b21b6">✓ 優化模塊</text>
    <text x="550" y="290" font-size="10" text-anchor="middle" fill="#5b21b6">✓ 測試完成</text>
    <text x="550" y="340" font-size="10" text-anchor="middle" fill="#7c3aed" font-weight="bold">📋 計劃中</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="640" y1="220" x2="680" y2="220" stroke="#666" stroke-width="3"/>
  <polygon points="680,220 670,215 670,225" fill="#666"/>
  
  <!-- Phase 4 -->
  <g>
    <rect x="680" y="80" width="180" height="280" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="770" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#15803d">Phase 4</text>
    <text x="770" y="135" font-size="12" text-anchor="middle" fill="#16a34a">訓練優化</text>
    <text x="770" y="155" font-size="12" text-anchor="middle" fill="#16a34a">模型調優</text>
    <text x="770" y="175" font-size="12" text-anchor="middle" fill="#16a34a">性能評估</text>
    <text x="770" y="200" font-size="11" text-anchor="middle" fill="#15803d" font-weight="bold">Week 9-10</text>
    <text x="770" y="230" font-size="10" text-anchor="middle" fill="#15803d">✓ 數據準備</text>
    <text x="770" y="250" font-size="10" text-anchor="middle" fill="#15803d">✓ 模型訓練</text>
    <text x="770" y="270" font-size="10" text-anchor="middle" fill="#15803d">✓ 參數調優</text>
    <text x="770" y="290" font-size="10" text-anchor="middle" fill="#15803d">✓ 性能測試</text>
    <text x="770" y="340" font-size="10" text-anchor="middle" fill="#16a34a" font-weight="bold">📋 計劃中</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="860" y1="220" x2="900" y2="220" stroke="#666" stroke-width="3"/>
  <polygon points="900,220 890,215 890,225" fill="#666"/>
  
  <!-- Phase 5 -->
  <g>
    <rect x="900" y="80" width="280" height="280" fill="#cffafe" stroke="#0891b2" stroke-width="2" rx="5"/>
    <text x="1040" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Phase 5</text>
    <text x="1040" y="135" font-size="12" text-anchor="middle" fill="#0a7ea4">評估驗證</text>
    <text x="1040" y="155" font-size="12" text-anchor="middle" fill="#0a7ea4">文檔完善</text>
    <text x="1040" y="175" font-size="12" text-anchor="middle" fill="#0a7ea4">開源發布</text>
    <text x="1040" y="200" font-size="11" text-anchor="middle" fill="#0c4a6e" font-weight="bold">Week 11-12</text>
    <text x="1040" y="230" font-size="10" text-anchor="middle" fill="#0c4a6e">✓ 完整評估</text>
    <text x="1040" y="250" font-size="10" text-anchor="middle" fill="#0c4a6e">✓ 對比分析</text>
    <text x="1040" y="270" font-size="10" text-anchor="middle" fill="#0c4a6e">✓ 文檔完成</text>
    <text x="1040" y="290" font-size="10" text-anchor="middle" fill="#0c4a6e">✓ GitHub 發布</text>
    <text x="1040" y="340" font-size="10" text-anchor="middle" fill="#0a7ea4" font-weight="bold">📋 計劃中</text>
  </g>
</svg>