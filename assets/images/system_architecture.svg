<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1000" height="600" fill="#f8f9fa"/>
  
  <!-- 標題 -->
  <text x="500" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    系統架構概圖
  </text>
  
  <!-- Layer 1: Input -->
  <rect x="350" y="70" width="300" height="50" fill="#e8f4f8" stroke="#0ea5e9" stroke-width="2" rx="5"/>
  <text x="500" y="103" font-size="16" font-weight="bold" text-anchor="middle" fill="#0c4a6e">
    Input Text / Prompts
  </text>
  
  <!-- Arrow down -->
  <line x1="500" y1="120" x2="500" y2="150" stroke="#666" stroke-width="2"/>
  <polygon points="500,150 495,140 505,140" fill="#666"/>
  
  <!-- Layer 2: Base LLM + LoRA -->
  <g>
    <!-- Base LLM -->
    <rect x="150" y="150" width="200" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="250" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#92400e">Base LLM</text>
    <text x="250" y="200" font-size="12" text-anchor="middle" fill="#b45309">(Llama, Mistral)</text>
    <text x="250" y="220" font-size="11" text-anchor="middle" fill="#b45309">Frozen Weights</text>
    
    <!-- LoRA -->
    <rect x="650" y="150" width="200" height="80" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="750" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#15803d">LoRA Adapter</text>
    <text x="750" y="200" font-size="12" text-anchor="middle" fill="#16a34a">Low-Rank</text>
    <text x="750" y="220" font-size="11" text-anchor="middle" fill="#16a34a">99% 參數減少</text>
  </g>
  
  <!-- Arrows to merge -->
  <line x1="350" y1="190" x2="400" y2="190" stroke="#666" stroke-width="2"/>
  <polygon points="400,190 390,185 390,195" fill="#666"/>
  
  <line x1="600" y1="190" x2="650" y2="190" stroke="#666" stroke-width="2"/>
  <polygon points="650,190 640,185 640,195" fill="#666"/>
  
  <!-- Merge point -->
  <circle cx="500" cy="270" r="20" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="500" y="275" font-size="12" font-weight="bold" text-anchor="middle" fill="white">+</text>
  
  <!-- Arrows down -->
  <line x1="250" y1="230" x2="250" y2="250" stroke="#666" stroke-width="2"/>
  <line x1="250" y1="250" x2="480" y2="250" stroke="#666" stroke-width="2"/>
  
  <line x1="750" y1="230" x2="750" y2="250" stroke="#666" stroke-width="2"/>
  <line x1="750" y1="250" x2="520" y2="250" stroke="#666" stroke-width="2"/>
  
  <!-- Arrow down from merge -->
  <line x1="500" y1="290" x2="500" y2="320" stroke="#666" stroke-width="2"/>
  <polygon points="500,320 495,310 505,310" fill="#666"/>
  
  <!-- Layer 3: RL Policy Optimization -->
  <rect x="300" y="320" width="400" height="80" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="5"/>
  <text x="500" y="345" font-size="14" font-weight="bold" text-anchor="middle" fill="#831843">RL Policy Network (PPO/DQN)</text>
  <text x="500" y="368" font-size="12" text-anchor="middle" fill="#9d174d">最佳化推理策略 | 動態資源分配</text>
  <text x="500" y="390" font-size="11" text-anchor="middle" fill="#be185d">獎勵: 準確度 + 速度 + 記憶體效率</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="400" x2="500" y2="430" stroke="#666" stroke-width="2"/>
  <polygon points="500,430 495,420 505,420" fill="#666"/>
  
  <!-- Layer 4: Optimization Techniques -->
  <g>
    <!-- Quantization -->
    <rect x="50" y="430" width="150" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="125" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">量化</text>
    <text x="125" y="475" font-size="11" text-anchor="middle" fill="#0c4a6e">INT8/INT4</text>
    <text x="125" y="490" font-size="10" text-anchor="middle" fill="#0369a1">4-8x 體積</text>
    
    <!-- KV Cache -->
    <rect x="275" y="430" width="150" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="350" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">KV 緩存</text>
    <text x="350" y="475" font-size="11" text-anchor="middle" fill="#0c4a6e">優化</text>
    <text x="350" y="490" font-size="10" text-anchor="middle" fill="#0369a1">30-50% 記憶體</text>
    
    <!-- Mixed Precision -->
    <rect x="500" y="430" width="150" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="575" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">混合精度</text>
    <text x="575" y="475" font-size="11" text-anchor="middle" fill="#0c4a6e">FP32+FP16</text>
    <text x="575" y="490" font-size="10" text-anchor="middle" fill="#0369a1">2-3x 速度</text>
    
    <!-- Token Pruning -->
    <rect x="725" y="430" width="150" height="70" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5"/>
    <text x="800" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Token 修剪</text>
    <text x="800" y="475" font-size="11" text-anchor="middle" fill="#0c4a6e">動態剪枝</text>
    <text x="800" y="490" font-size="10" text-anchor="middle" fill="#0369a1">20-40% 計算</text>
  </g>
  
  <!-- Arrows from optimization -->
  <line x1="125" y1="430" x2="500" y2="420" stroke="#666" stroke-width="2"/>
  <line x1="350" y1="430" x2="500" y2="420" stroke="#666" stroke-width="2"/>
  <line x1="575" y1="430" x2="500" y2="420" stroke="#666" stroke-width="2"/>
  <line x1="800" y1="430" x2="500" y2="420" stroke="#666" stroke-width="2"/>
  
  <!-- Final arrow -->
  <line x1="500" y1="520" x2="500" y2="540" stroke="#666" stroke-width="2"/>
  <polygon points="500,540 495,530 505,530" fill="#666"/>
  
  <!-- Output -->
  <rect x="350" y="540" width="300" height="50" fill="#e8f4f8" stroke="#0ea5e9" stroke-width="2" rx="5"/>
  <text x="500" y="573" font-size="16" font-weight="bold" text-anchor="middle" fill="#0c4a6e">
    Optimized Output (2-5x Faster, 40-60% Less Memory)
  </text>
</svg>