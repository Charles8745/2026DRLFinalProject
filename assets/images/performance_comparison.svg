<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1000" height="500" fill="#f8f9fa"/>
  
  <!-- 標題 -->
  <text x="500" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    性能指標對比 (Baseline vs Optimized)
  </text>
  
  <!-- Y 軸標籤 -->
  <text x="45" y="90" font-size="12" font-weight="bold" fill="#666">200ms</text>
  <text x="50" y="150" font-size="12" font-weight="bold" fill="#666">150ms</text>
  <text x="50" y="210" font-size="12" font-weight="bold" fill="#666">100ms</text>
  <text x="65" y="270" font-size="12" font-weight="bold" fill="#666">50ms</text>
  <text x="70" y="330" font-size="12" font-weight="bold" fill="#666">0ms</text>
  
  <!-- Y 軸線 -->
  <line x1="80" y1="80" x2="80" y2="320" stroke="#ccc" stroke-width="1"/>
  <!-- X 軸線 -->
  <line x1="80" y1="320" x2="950" y2="320" stroke="#ccc" stroke-width="1"/>
  
  <!-- Y 軸網格線 -->
  <line x1="80" y1="150" x2="950" y2="150" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="80" y1="210" x2="950" y2="210" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="80" y1="270" x2="950" y2="270" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- 1. 推理延遲 (Latency) -->
  <!-- Baseline -->
  <rect x="120" y="100" width="40" height="220" fill="#f87171" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="340" font-size="11" text-anchor="middle" fill="#666">Baseline</text>
  
  <!-- Optimized -->
  <rect x="175" y="280" width="40" height="40" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="195" y="340" font-size="11" text-anchor="middle" fill="#666">Optimized</text>
  
  <!-- Label -->
  <text x="195" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">推理延遲</text>
  <text x="140" y="330" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">200ms</text>
  <text x="195" y="330" font-size="10" text-anchor="middle" fill="#059669" font-weight="bold">40ms</text>
  <text x="167" y="380" font-size="11" text-anchor="middle" fill="#1a1a1a" font-weight="bold">5x 加速</text>
  
  <!-- 2. 吞吐量 (Throughput) -->
  <!-- Y 軸: 0-300 req/s -->
  <text x="250" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">吞吐量</text>
  <text x="255" y="90" font-size="10" fill="#999">300</text>
  <text x="255" y="210" font-size="10" fill="#999">150</text>
  <text x="270" y="330" font-size="10" fill="#999">0</text>
  
  <!-- Grid -->
  <line x1="280" y1="90" x2="380" y2="90" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="280" y1="150" x2="380" y2="150" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="280" y1="210" x2="380" y2="210" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Baseline -->
  <rect x="310" y="240" width="40" height="80" fill="#f87171" stroke="#dc2626" stroke-width="2"/>
  <text x="330" y="340" font-size="11" text-anchor="middle" fill="#666">Baseline</text>
  
  <!-- Optimized -->
  <rect x="365" y="90" width="40" height="230" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="385" y="340" font-size="11" text-anchor="middle" fill="#666">Optimized</text>
  
  <text x="330" y="335" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">50</text>
  <text x="385" y="85" font-size="10" text-anchor="middle" fill="#059669" font-weight="bold">280</text>
  <text x="357" y="380" font-size="11" text-anchor="middle" fill="#1a1a1a" font-weight="bold">5.6x 提升</text>
  
  <!-- 3. 顯存占用 (Memory) -->
  <!-- Y 軸: 0-20GB -->
  <text x="515" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">顯存占用</text>
  <text x="455" y="90" font-size="10" fill="#999">20GB</text>
  <text x="460" y="210" font-size="10" fill="#999">10GB</text>
  <text x="475" y="330" font-size="10" fill="#999">0GB</text>
  
  <!-- Grid -->
  <line x1="480" y1="90" x2="580" y2="90" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="480" y1="150" x2="580" y2="150" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="480" y1="210" x2="580" y2="210" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Baseline -->
  <rect x="510" y="80" width="40" height="240" fill="#f87171" stroke="#dc2626" stroke-width="2"/>
  <text x="530" y="340" font-size="11" text-anchor="middle" fill="#666">Baseline</text>
  
  <!-- Optimized -->
  <rect x="565" y="210" width="40" height="110" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="585" y="340" font-size="11" text-anchor="middle" fill="#666">Optimized</text>
  
  <text x="530" y="335" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">16GB</text>
  <text x="585" y="205" font-size="10" text-anchor="middle" fill="#059669" font-weight="bold">6.5GB</text>
  <text x="557" y="380" font-size="11" text-anchor="middle" fill="#1a1a1a" font-weight="bold">59% 節省</text>
  
  <!-- 4. 精度保留率 (Accuracy Retention) -->
  <!-- Y 軸: 0-100% -->
  <text x="765" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">精度保留率</text>
  <text x="685" y="90" font-size="10" fill="#999">100%</text>
  <text x="690" y="210" font-size="10" fill="#999">50%</text>
  <text x="705" y="330" font-size="10" fill="#999">0%</text>
  
  <!-- Grid -->
  <line x1="730" y1="90" x2="830" y2="90" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="730" y1="210" x2="830" y2="210" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Baseline -->
  <rect x="760" y="90" width="40" height="230" fill="#0ea5e9" stroke="#0284c7" stroke-width="2"/>
  <text x="780" y="340" font-size="11" text-anchor="middle" fill="#666">Baseline</text>
  
  <!-- Optimized -->
  <rect x="815" y="112" width="40" height="208" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="835" y="340" font-size="11" text-anchor="middle" fill="#666">Optimized</text>
  
  <text x="780" y="335" font-size="10" text-anchor="middle" fill="#0284c7" font-weight="bold">100%</text>
  <text x="835" y="107" font-size="10" text-anchor="middle" fill="#059669" font-weight="bold">96%</text>
  <text x="807" y="380" font-size="11" text-anchor="middle" fill="#1a1a1a" font-weight="bold">>95% 目標</text>
  
  <!-- 5. 模型大小 (Model Size) -->
  <!-- Y 軸: 0-50GB -->
  <text x="935" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">模型大小</text>
  <text x="895" y="90" font-size="10" fill="#999">50GB</text>
  <text x="895" y="210" font-size="10" fill="#999">25GB</text>
  <text x="910" y="330" font-size="10" fill="#999">0GB</text>
  
  <!-- Grid -->
  <line x1="900" y1="90" x2="950" y2="90" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="900" y1="210" x2="950" y2="210" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Baseline -->
  <rect x="925" y="130" width="40" height="190" fill="#f87171" stroke="#dc2626" stroke-width="2"/>
  <text x="945" y="340" font-size="11" text-anchor="middle" fill="#666">Baseline</text>
  
  <text x="945" y="335" font-size="10" text-anchor="middle" fill="#dc2626" font-weight="bold">38GB</text>
</svg>